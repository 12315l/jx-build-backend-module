    data_scope_rule: ""
    page_permission: ""
    action_permissions: []
    source_requirement_ids: []

dependencies:
  base_modules: []
  business_modules: []
  dictionaries: []
  files_or_storage: []
  external_capabilities: []
  forbidden_new_capabilities: []

persistence:
  primary_key:
    property: "id"
    column: "id"
    java_type: "Integer"
    sql_type: "INT"
    auto_increment: true
  logical_delete:
    enabled: true
    property: "isDelete"
    column: "is_delete"
    active_value: 0
    deleted_value: 1
  common_fields:
    creator: true
    create_time: true
    update_time: true
    status: null
    type: null
    sort: null
  fields:
    - field_id: "FIELD-001"
      business_name: ""
      property_name: ""
      column_name: ""
      java_type: ""
      sql_type: ""
      length: null
      precision: null
      scale: null
      nullable: true
      default_value: null
      unique: false
      validation_rules: []
      validation_message: ""
      query_usage: [] # exact | fuzzy | range | sort | group
      display: true
      excel_import: false
      excel_export: false
      association:
        enabled: false
        target_module: ""
        target_entity: ""
        target_property: ""
        deletion_effect: ""
      source_requirement_ids: []
      notes: ""
  indexes: []
  unique_constraints: []
  destructive_statements_allowed: false

template_capability_switches:
  admin_details: true
  admin_page: true
  create: null
  edit: null
  remove: null
  public_details: false
  public_page: false
  recover: false
  batch_status: false
  batch_sort: false
  low_code_metadata: true
  excel_import: false
  excel_export: false
  permission_sql: true

# 后台权限菜单采用“模块目录 → 业务页面 → 操作按钮”三级结构。
# 独立模块默认使用 create_module_directory；只有需求明确归入既有目录时才使用 attach_existing_directory。
permission_menu:
  enabled: true
  strategy: "create_module_directory" # create_module_directory | attach_existing_directory | no_menu
  match_type: 2
  directory:
    name: ""
    permission_code: "manage:dir:${camel_name}"
    permission_type: 0
    router_path: "/main/modules/${camel_name}/pages"
    parent_id: null
    parent_router: null
    icon: ""
    order_by: 0
  existing_parent:
    permission_code: ""
    required: false
  page:
    name: ""
    permission_code: "manage:page:${camel_name}:base"
    permission_type: 1
    router_path: "/main/modules/${camel_name}/pages/base"
    parent_permission_code: "manage:dir:${camel_name}"
    parent_router: "/main/modules/${camel_name}/pages"
    icon: ""
    order_by: 0
  buttons:
    - action: "create"
      name: ""
      permission_code: "manage:btn:${camel_name}:create"
      permission_type: 2
      parent_permission_code: "manage:page:${camel_name}:base"
      parent_router: "/main/modules/${camel_name}/pages/base"
  idempotent_by_permission_code: true
  fixed_parent_id_allowed: false

queries:
  - query_id: "QUERY-001"
    name: "后台分页查询"
    endpoint: "/page"
    http_method: "GET"
    request_type: "CommonPage" # 真实额外筛选存在时填写专用 Page 类
    access: "protected" # public | protected
    roles: []
    data_scope: ""
    filters: []
    pagination: true
    default_sort: ""
    result_shape: "entity" # entity | vo | aggregate
    result_type: ""
    implementation: "mybatis_plus" # mybatis_plus | custom_dao | mapper_xml
    empty_result: "empty_page"
    source_requirement_ids: []

write_operations:
  create:
    enabled: null
    request_type: "entity" # entity | dto
    validation_rules: []
    server_owned_fields: ["creator", "createTime", "isDelete"]
  edit:
    enabled: null
    request_type: "entity"
    validation_rules: []
    immutable_fields: ["creator", "createTime"]
  remove:
    enabled: null
    logical: true
    association_checks: []
  recover:
    enabled: false
    allowed_roles: []

business_actions:
  - action_id: "ACTION-001"
    name: ""
    endpoint: ""
    http_method: "POST"
    access: "" # authenticated | authority | public
    authority: "" # access=authority 时必填，并与权限 SQL、前端按钮一致
    allowed_roles: []
    data_scope: ""
    request_type: "" # dto | entity | params
