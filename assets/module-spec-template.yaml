    enforcement_layer: "service" # service | database | service_and_database
    implementation_location: ""
    verification_case: ""

api_contract:
  response_wrapper: "SimpleHttpResponse"
  pagination_request: "CommonPage"
  pagination_response: "PageList"
  error_style: "platform_business_message"
  identity_source: "SecurityUtil"
  public_endpoints: []
  protected_endpoints: []

# 仅描述前端页面与后台之间的真实数据契约，不承担页面视觉设计。
