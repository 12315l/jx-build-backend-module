  version: "1.0"
  status: "draft" # draft | ready | authorized | implemented | verified
  project_name: ""
  module_spec_id: "MODULE-001"
  created_from:
    requirement_document: ""
    source_files: []
    latest_corrections: []
  implementation_authorized: false

module_identity:
  chinese_name: ""
  pascal_name: ""
  camel_name: ""
  snake_name: ""
  generation_profile: "" # quick_crud | standard_relation | business_workflow | statistics_query
  operation_mode: "" # create_new | enhance_existing | audit_only
  backend_module_root: "base-framework"
  java_source_root: "base-framework/src/main/java"
  resources_root: "base-framework/src/main/resources"
  package_root: "system.store.functionModule.${pascal_name}Module"
  module_directory: "base-framework/src/main/java/system/store/functionModule/${pascal_name}Module"
  controller_route_prefix: "/${camel_name}"
  permission_key: "${camel_name}"
  table_strategy: "" # create_table | alter_existing | reuse_existing | no_table
  table_name: "c_${snake_name}_table"
  business_goal: ""
  in_scope: []
  out_of_scope: []

coverage_summary:
  current_state: ""
  target_state: ""
  coverage_status: "to_develop" # platform_existing | partial | to_develop | to_remove | verified
  inspected_evidence: []

roles:
  - role_code: ""
    role_name: ""
    operations: []
